<include href="admin/layout.html" />

<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
    <h2 style="margin:0;">Боты</h2>
    <form method="POST" action="/admin/bots/restart" style="margin:0;"
          onsubmit="return confirm('Перезапустить все боты? Активные боты перезагрузятся в течение ~10 секунд.');">
        <input type="hidden" name="csrf_token" value="{{ @csrf_token }}">
        <button type="submit" class="btn btn-danger">🔄 Перезапустить все боты</button>
    </form>
</div>

<check if="{{ @flash }}">
    <div class="card" style="background:#e8f7ee;color:#1f6b3a;border-left:4px solid #2ecc71;padding:12px 16px;">
        {{ @flash }}
    </div>
</check>

<div class="card">
    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Название</th>
                <th>Статус</th>
                <th>Токен</th>
                <th>Пользователи</th>
                <th>URL вебаппа</th>
                <th>Действия</th>
            </tr>
        </thead>
        <tbody>
            <repeat group="{{ @bots }}" value="{{ @bot }}">
                <tr>
                    <td>{{ @bot.id }}</td>
                    <td><strong>{{ @bot.name }}</strong></td>
                    <td>
                        <check if="{{ @bot.is_active }}">
                            <true><span class="badge" style="background:#e8f7ee;color:#1f6b3a;">🟢 Активен</span></true>
                            <false><span class="badge" style="background:#eee;color:#777;">⚪ Отключён</span></false>
                        </check>
                    </td>
                    <td>
                        <code style="font-size:12px;color:#888;">{{ substr(@bot.token,0,8) }}...{{ substr(@bot.token,-6) }}</code>
                    </td>
                    <td><span class="badge badge-info">{{ @bot.user_count }}</span></td>
                    <td style="font-size:12px;color:#888;">{{ @bot.webapp_url }}</td>
                    <td>
                        <button class="btn btn-sm btn-secondary" onclick="editBot({{ @bot.id }})">Редактировать</button>
                        <a href="/admin/translations?bot_id={{ @bot.id }}" class="btn btn-sm btn-primary">Переводы</a>
                    </td>
                </tr>
            </repeat>
        </tbody>
    </table>
</div>

<div class="card" id="bot-form-card">
    <h3 id="form-title" style="margin-bottom:16px;font-size:16px;">Добавить нового бота</h3>
    <form method="POST" action="/admin/bots">
        <input type="hidden" name="csrf_token" value="{{ @csrf_token }}">
        <input type="hidden" name="id" id="bot-id" value="">

        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px;">
            <div>
                <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px;">Название *</label>
                <input type="text" name="name" id="bot-name" required style="width:100%;">
            </div>
            <div>
                <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px;">Токен *</label>
                <input type="text" name="token" id="bot-token" required style="width:100%;">
            </div>
            <div>
                <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px;">URL вебаппа</label>
                <input type="text" name="webapp_url" id="bot-webapp-url" style="width:100%;" placeholder="https://domain.com/app/1/">
            </div>
            <div>
                <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px;">Привязанный канал (URL / @username)</label>
                <input type="text" name="linked_channel" id="bot-linked-channel" style="width:100%;" placeholder="@channel или https://t.me/+invite">
            </div>
            <div>
                <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px;">ID канала для подписки</label>
                <input type="text" name="linked_channel_id" id="bot-linked-channel-id" style="width:100%;" placeholder="-1001234567890">
            </div>
            <div>
                <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px;">ID группы — админы</label>
                <input type="text" name="admin_group_id" id="bot-admin-group-id" style="width:100%;" placeholder="-100XXXXXXXXXX">
            </div>
            <div>
                <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px;">Ссылка поддержки</label>
                <input type="text" name="support_link" id="bot-support-link" style="width:100%;" placeholder="https://t.me/support">
            </div>
            <div>
                <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px;">Реферальная ссылка</label>
                <input type="text" name="referral_url_template" id="bot-referral-url" style="width:100%;" placeholder="https://example.com/smart/XXX?click_id={user_id}&sub_id1={bot_id}">
            </div>
            <div>
                <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px;">Postback secret</label>
                <input type="text" name="postback_secret" id="bot-postback-secret" style="width:100%;">
            </div>
            <div>
                <label style="display:block;font-size:12px;font-weight:600;margin-bottom:4px;">Код доступа (access_password)</label>
                <input type="text" name="access_password" id="bot-access-password" maxlength="64"
                       placeholder="оставьте пустым, чтобы отключить парольный гейт" style="width:100%;">
            </div>

            <!--
                Postback URL hint (re-rendered client-side by editBot()).
                Server-side it's always empty on first render because the form starts
                in "create" mode. Depends on the global setting `postback_base_url`
                (migration 017) injected as POSTBACK_BASE_URL below.
            -->
            <div id="postback-url-hint" style="grid-column:1 / -1;font-size:13px;line-height:1.5;"></div>

            <div style="grid-column:1 / -1;">
                <label style="display:inline-flex;align-items:center;gap:8px;font-size:13px;font-weight:600;cursor:pointer;">
                    <input type="checkbox" name="is_active" id="bot-is-active" value="1" checked>
                    Активен (лончер начнёт опрос этого бота после следующего перезапуска)
                </label>
            </div>
        </div>

        <button type="submit" class="btn btn-primary">Сохранить бота</button>
        <button type="button" class="btn btn-secondary" onclick="resetForm()">Отмена</button>
    </form>
</div>

<script>
    var botsData = {~ echo \Base::instance()->get('bots_json'); ~};
    var POSTBACK_BASE_URL = {~ echo \Base::instance()->get('postback_base_url_json') ?: '""'; ~};
    // Defensive: strip a trailing `/postback` from historical values so we
    // don't produce `/postback/postback?...` when concatenating below. The
    // server-side saveSettings() also strips this on new saves.
    POSTBACK_BASE_URL = String(POSTBACK_BASE_URL || '').replace(/\/postback$/, '');

    // Minimal HTML escape for values we render into innerHTML.
    function escapeHtml(s) {
        return String(s == null ? '' : s)
            .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // Re-render the postback-URL hint block below the Postback Secret field.
    // Three states, per spec:
    //   - base URL empty  → warn, link to /admin/settings
    //   - base URL set, secret empty or bot not saved yet → tell user to save secret first
    //   - base URL set, bot.id and secret both present → show full URL + copy button
    function renderPostbackHint(bot) {
        var el = document.getElementById('postback-url-hint');
        if (!el) return;

        var baseUrl = POSTBACK_BASE_URL || '';
        var botId = bot && bot.id ? bot.id : '';
        // Prefer the live form value so the hint updates as the admin types.
        var secret = document.getElementById('bot-postback-secret').value || (bot && bot.postback_secret) || '';

        if (!baseUrl) {
            el.innerHTML =
                '<div style="padding:10px 12px;background:#fff6e5;border-left:4px solid #f0b400;color:#7a5800;border-radius:4px;">' +
                '⚠️ Задайте <a href="/admin/settings">Postback Base URL</a> в Настройках, чтобы увидеть URL для партнёрки.' +
                '</div>';
            return;
        }

        if (!botId || !secret) {
            el.innerHTML =
                '<div style="padding:10px 12px;background:#f4f5f7;border-left:4px solid #aaa;color:#555;border-radius:4px;">' +
                'Сначала задайте Postback Secret и сохраните бота — после этого здесь появится готовый URL.' +
                '</div>';
            return;
        }

        // Canonical postback URL format (see docs/postbacks.md):
        // Partner auto-appends click_id (tg_id) and sub_id1 (bot_id).
        // We only need secret and event in the URL.
        var url = baseUrl +
            '/postback?secret=' + encodeURIComponent(secret) +
            '&event=reg';

        el.innerHTML =
            '<div style="padding:10px 12px;background:#eef5ff;border-left:4px solid #4a6cf7;border-radius:4px;">' +
              '<div style="font-size:12px;color:#555;margin-bottom:4px;">Postback URL (скопируйте в партнёрский кабинет):</div>' +
              '<code id="postback-url-value" style="display:block;word-break:break-all;font-size:12px;background:#fff;padding:6px 8px;border-radius:3px;border:1px solid #d7defa;">' +
                escapeHtml(url) +
              '</code>' +
              '<button type="button" class="btn btn-sm btn-secondary" style="margin-top:8px;" onclick="copyPostbackUrl(this)">📋 Копировать</button>' +
              '<span id="postback-url-flash" style="margin-left:8px;font-size:12px;color:#1f6b3a;"></span>' +
            '</div>';
    }

    function copyPostbackUrl(btn) {
        var code = document.getElementById('postback-url-value');
        if (!code) return;
        var text = code.textContent || '';
        var flash = document.getElementById('postback-url-flash');
        var done = function () {
            if (flash) {
                flash.textContent = 'Скопировано';
                setTimeout(function () { flash.textContent = ''; }, 1500);
            }
        };
        if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done, function () {
                // Fallback below.
                fallbackCopy(text, done);
            });
        } else {
            fallbackCopy(text, done);
        }
    }

    function fallbackCopy(text, done) {
        var ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); } catch (e) {}
        document.body.removeChild(ta);
        done();
    }

    function editBot(id) {
        var bot = botsData.find(function(b) { return b.id == id; });
        if (!bot) return;

        document.getElementById('form-title').textContent = 'Редактирование бота #' + id;
        document.getElementById('bot-id').value = bot.id;
        document.getElementById('bot-name').value = bot.name || '';
        document.getElementById('bot-token').value = bot.token || '';
        document.getElementById('bot-webapp-url').value = bot.webapp_url || '';
        document.getElementById('bot-linked-channel').value = bot.linked_channel || '';
        document.getElementById('bot-linked-channel-id').value = bot.linked_channel_id || '';
        document.getElementById('bot-admin-group-id').value = bot.admin_group_id || '';
        document.getElementById('bot-support-link').value = bot.support_link || '';
        document.getElementById('bot-referral-url').value = bot.referral_url_template || '';
        document.getElementById('bot-postback-secret').value = bot.postback_secret || '';
        document.getElementById('bot-access-password').value = bot.access_password || '';
        document.getElementById('bot-is-active').checked = !!Number(bot.is_active);

        renderPostbackHint(bot);
        document.getElementById('bot-form-card').scrollIntoView({ behavior: 'smooth' });
    }

    function resetForm() {
        document.getElementById('form-title').textContent = 'Добавить нового бота';
        document.getElementById('bot-id').value = '';
        document.getElementById('bot-name').value = '';
        document.getElementById('bot-token').value = '';
        document.getElementById('bot-webapp-url').value = '';
        document.getElementById('bot-linked-channel').value = '';
        document.getElementById('bot-linked-channel-id').value = '';
        document.getElementById('bot-admin-group-id').value = '';
        document.getElementById('bot-support-link').value = '';
        document.getElementById('bot-referral-url').value = '';
        document.getElementById('bot-postback-secret').value = '';
        document.getElementById('bot-access-password').value = '';
        document.getElementById('bot-is-active').checked = true;
        renderPostbackHint(null);
    }

    // Live-update hint when secret is edited or initial load (create mode).
    document.addEventListener('DOMContentLoaded', function () {
        renderPostbackHint(null);
        var secretInput = document.getElementById('bot-postback-secret');
        if (secretInput) {
            secretInput.addEventListener('input', function () {
                var id = document.getElementById('bot-id').value;
                var bot = id ? botsData.find(function (b) { return b.id == id; }) : null;
                renderPostbackHint(bot);
            });
        }
    });
</script>

<include href="admin/layout_close.html" />
