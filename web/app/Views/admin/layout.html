<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ @page_title }} — Админка — M-Bot-Forex</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f0f2f5;
            color: #333;
        }
        .topbar {
            background: #1a1a2e;
            color: #fff;
            padding: 0 24px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .topbar .brand {
            font-size: 16px;
            font-weight: 700;
        }
        .topbar .brand span {
            color: #4a6cf7;
        }
        .topbar nav a {
            color: #aab;
            text-decoration: none;
            margin-left: 20px;
            font-size: 14px;
            transition: color 0.2s;
        }
        .topbar nav a:hover,
        .topbar nav a.active {
            color: #fff;
        }
        .topbar .user-info {
            font-size: 13px;
            color: #aab;
        }
        .topbar .user-info a {
            color: #f77;
            text-decoration: none;
            margin-left: 12px;
        }
        .content {
            max-width: 1200px;
            margin: 24px auto;
            padding: 0 24px;
        }
        h2 {
            font-size: 22px;
            margin-bottom: 20px;
            color: #1a1a2e;
        }
        .card {
            background: #fff;
            border-radius: 8px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.08);
            padding: 24px;
            margin-bottom: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        table th, table td {
            padding: 10px 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
            font-size: 14px;
        }
        table th {
            font-weight: 600;
            color: #666;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        table tr:hover {
            background: #f8f9fa;
        }
        .btn {
            padding: 8px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: background 0.2s;
        }
        .btn-primary {
            background: #4a6cf7;
            color: #fff;
        }
        .btn-primary:hover {
            background: #3a5ce5;
        }
        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }
        .btn-danger {
            background: #e74c3c;
            color: #fff;
        }
        .btn-danger:hover {
            background: #c0392b;
        }
        .btn-secondary {
            background: #eee;
            color: #333;
        }
        .btn-secondary:hover {
            background: #ddd;
        }
        .badge {
            display: inline-block;
            padding: 3px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-info {
            background: #e8f0fe;
            color: #4a6cf7;
        }
        input[type="text"],
        input[type="password"],
        select,
        textarea {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: inherit;
            transition: border-color 0.2s;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #4a6cf7;
            box-shadow: 0 0 0 3px rgba(74,108,247,0.1);
        }
        .form-inline {
            display: flex;
            gap: 8px;
            align-items: center;
            flex-wrap: wrap;
        }
        img.emoji {
            height: 1em;
            width: 1em;
            margin: 0 0.05em 0 0.1em;
            vertical-align: -0.1em;
        }
    </style>
</head>
<body>
    <div class="topbar">
        <div style="display:flex;align-items:center;">
            <div class="brand">M-Bot<span>Forex</span></div>
            <nav>
                <a href="/admin/bots" class="{{ @page_title=='Bots'?'active':'' }}">Боты</a>
                <a href="/admin/users" class="{{ @page_title=='Users'?'active':'' }}">👥 Пользователи</a>
                <a href="/admin/postbacks" class="{{ @page_title=='Postbacks'?'active':'' }}">Постбеки</a>
                <a href="/admin/translations" class="{{ @page_title=='Translations'?'active':'' }}">Переводы</a>
                <a href="/admin/settings" class="{{ @page_title=='Settings'?'active':'' }}">⚙ Настройки</a>
            </nav>
        </div>
        <div class="user-info">
            {{ @admin_username }}
            <a href="/admin/logout">Выйти</a>
        </div>
    </div>
    <div class="content">
